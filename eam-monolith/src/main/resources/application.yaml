server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: eam-simulator
    # ===================================================================
    # (H2 In-Memory)
    # ===================================================================
    datasource:
      url: jdbc:h2:mem:eam_db
      driver-class-name: org.h2.Driver
      username: sa
      password: ""

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true
      open-in-view: false
    h2:
      console:
        enabled: true
        path: /h2-console
engine:
  async:
    core-pool-size: 2
    max-pool-size: 5
    queue-capacity: 10
    thread-prefix: "GameEngine-"
    await-termination-seconds: 30
  simulation:
    target-fps: 60

management:
  endpoints:
    web:
      exposure:
        include: "health,info,gamestatus"
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%thread] %logger{36} : %m%n"
  level:
    root: INFO
    com.eam_simulator.engine: DEBUG
    org.springframework.web: INFO