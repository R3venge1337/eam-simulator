apiVersion: apps/v1
kind: Deployment
metadata:
  name: eam-simulator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eam-simulator
  template:
    metadata:
      labels:
        app: eam-simulator
    spec:
      containers:
        - name: eam-simulator
          image: r3venge1337/eam-simulator:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: eam-simulator-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: eam-simulator
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30080 # Aplikacja będzie dostępna na porcie 30080 Twojego IP